name: Deploy Edge Functions

# Guards against the failure mode where edge-function code is merged to main but
# never deployed (migrations apply automatically, but `supabase/functions/**`
# does not). Any change to the functions or their config redeploys them so the
# running function always matches main.
on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-edge-functions.yml"
  # Allow a manual redeploy from the Actions tab without a code change.
  workflow_dispatch:

# Serialize deploys so two quick merges can't race to push different versions.
concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: hhafkmzuqgobmvuiblko
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # verify_jwt is read from supabase/config.toml, so the deploy preserves
      # fetch-scores' shared-secret auth (no JWT required for the cron caller).
      - name: Deploy fetch-scores
        run: supabase functions deploy fetch-scores --project-ref "$PROJECT_REF"
